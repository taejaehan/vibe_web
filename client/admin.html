<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeBattle - Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #0f3460;
    }
    .header h1 { font-size: 24px; }
    .status {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
    }
    .status.waiting { background: #f39c12; color: #000; }
    .status.playing { background: #2ecc71; color: #000; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .panel {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #0f3460;
    }
    .panel h2 {
      font-size: 16px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #0f3460;
    }

    /* 플레이어 리스트 */
    .player-list {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .player-card {
      background: #0f3460;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      position: relative;
    }
    .player-card.empty { opacity: 0.4; }
    .player-card.connected { border: 2px solid #2ecc71; }
    .player-card.error { border: 2px solid #e74c3c; }
    .player-card.disconnected { border: 2px solid #666; opacity: 0.6; }
    .player-id {
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }
    .player-name {
      font-weight: bold;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-status {
      font-size: 11px;
      color: #2ecc71;
    }
    .player-card.error .player-status { color: #e74c3c; }
    .player-card.disconnected .player-status { color: #666; }
    .reset-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: #e74c3c;
      border: none;
      color: #fff;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 10px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .player-card:hover .reset-btn { opacity: 1; }

    /* 게임 컨트롤 */
    .control-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    select, input[type="text"], input[type="number"] {
      background: #0f3460;
      border: 1px solid #1a4a7a;
      color: #fff;
      padding: 10px 15px;
      border-radius: 6px;
      font-size: 14px;
      flex: 1;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #2ecc71;
    }
    button {
      background: #0f3460;
      border: 1px solid #1a4a7a;
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #1a4a7a; }
    button.primary { background: #2ecc71; color: #000; border-color: #2ecc71; }
    button.primary:hover { background: #27ae60; }
    button.danger { background: #e74c3c; border-color: #e74c3c; }
    button.danger:hover { background: #c0392b; }

    /* 미션 */
    .mission-input {
      width: 100%;
      margin-bottom: 10px;
    }

    /* 특수 이벤트 */
    .event-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .event-btn {
      flex: 1;
      min-width: 120px;
      padding: 15px;
      text-align: center;
    }
    .event-btn span {
      display: block;
      font-size: 24px;
      margin-bottom: 5px;
    }

    /* 로그 */
    .log-panel {
      grid-column: 1 / -1;
    }
    .log-list {
      background: #0a0a14;
      border-radius: 6px;
      padding: 15px;
      height: 150px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
    }
    .log-entry {
      padding: 3px 0;
      border-bottom: 1px solid #1a1a2e;
    }
    .log-time { color: #666; }
    .log-event { color: #2ecc71; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔧 VibeBattle Admin</h1>
    <span id="game-status" class="status waiting">대기 중</span>
  </div>

  <div class="grid">
    <!-- 플레이어 현황 -->
    <div class="panel" style="grid-column: 1 / -1;">
      <h2>👥 플레이어 현황</h2>
      <div id="player-list" class="player-list"></div>
    </div>

    <!-- 게임 컨트롤 -->
    <div class="panel">
      <h2>🎮 게임 컨트롤</h2>
      <div class="control-row">
        <select id="game-mode">
          <option value="sandbox">🎨 Sandbox (자유 모드)</option>
          <option value="zoo">🦁 동물원 만들기</option>
          <option value="pixelwar">⚔️ 픽셀 전쟁</option>
        </select>
        <button id="btn-set-mode">적용</button>
      </div>
      <div class="control-row">
        <button id="btn-start" class="primary" style="flex: 2;">▶ 게임 시작</button>
        <button id="btn-reset" class="danger">🔄 리셋</button>
      </div>
    </div>

    <!-- 미션 전송 -->
    <div class="panel">
      <h2>📋 미션 전송</h2>
      <input type="text" id="mission-text" class="mission-input" placeholder="미션 내용을 입력하세요...">
      <div class="control-row">
        <input type="number" id="mission-time" placeholder="제한시간(초)" value="180" style="width: 120px;">
        <button id="btn-mission" class="primary">📢 미션 전송</button>
        <button id="btn-clear-mission">미션 해제</button>
      </div>
    </div>

    <!-- 특수 이벤트 -->
    <div class="panel" style="grid-column: 1 / -1;">
      <h2>⚡ 특수 이벤트</h2>
      <div class="event-buttons">
        <button class="event-btn" data-event="shuffle">
          <span>🔀</span>셀 셔플
        </button>
        <button class="event-btn" data-event="freeze">
          <span>❄️</span>전체 정지
        </button>
        <button class="event-btn" data-event="chaos">
          <span>🌀</span>카오스 모드
        </button>
        <button class="event-btn" data-event="spotlight">
          <span>🔦</span>스포트라이트
        </button>
        <button class="event-btn" data-event="sabotage">
          <span>💣</span>랜덤 사보타주
        </button>
      </div>
    </div>

    <!-- 로그 -->
    <div class="panel log-panel">
      <h2>📜 이벤트 로그</h2>
      <div id="log-list" class="log-list"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script type="module" src="/js/admin.js"></script>
</body>
</html>
