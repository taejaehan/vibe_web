<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeBattle - Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 헤더 */
    .header {
      background: #16213e;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #0f3460;
    }
    .header h1 {
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .player-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .player-name-input {
      background: #0f3460;
      border: 1px solid #1a4a7a;
      color: #fff;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 14px;
      width: 150px;
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      background: #0f3460;
    }
    .status-badge.connected { background: #2ecc71; color: #000; }
    .status-badge.error { background: #e74c3c; }

    /* 미션 배너 */
    .mission-banner {
      background: #e94560;
      padding: 10px 20px;
      text-align: center;
      font-weight: bold;
      display: none;
    }
    .mission-banner.active { display: block; }

    /* 메인 컨텐츠 */
    .main {
      flex: 1;
      display: flex;
      gap: 0;
      overflow: hidden;
    }

    /* 에디터 영역 */
    .editor-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 2px solid #0f3460;
    }
    #editor {
      flex: 1;
      min-height: 0;
    }

    /* 프리뷰 영역 */
    .preview-section {
      width: 400px;
      display: flex;
      flex-direction: column;
      background: #16213e;
    }
    .preview-header {
      padding: 10px;
      background: #0f3460;
      font-size: 14px;
      font-weight: bold;
    }
    .preview-canvas-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }
    #preview-canvas {
      background: #1a1a2e;
      max-width: 100%;
      max-height: 100%;
      border: 2px solid #0f3460;
    }
    .preview-stats {
      padding: 10px;
      background: #0f3460;
      font-size: 12px;
      display: flex;
      justify-content: space-around;
    }
    .stat { display: flex; align-items: center; gap: 5px; }
    .stat-value { color: #2ecc71; font-weight: bold; }

    /* 실행 버튼 */
    .run-btn {
      background: #2ecc71;
      color: #000;
      border: none;
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .run-btn:hover { background: #27ae60; }
    .run-btn:active { transform: scale(0.98); }

    /* 이름 입력 모달 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal {
      background: #16213e;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      border: 2px solid #0f3460;
    }
    .modal h2 { margin-bottom: 20px; }
    .modal input {
      background: #0f3460;
      border: 2px solid #1a4a7a;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 18px;
      width: 250px;
      text-align: center;
      margin-bottom: 20px;
    }
    .modal input:focus {
      outline: none;
      border-color: #2ecc71;
    }
    .modal button {
      background: #2ecc71;
      color: #000;
      border: none;
      padding: 12px 40px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .modal-hidden { display: none; }
  </style>
</head>
<body>
  <!-- 이름 입력 모달 -->
  <div id="name-modal" class="modal-overlay">
    <div class="modal">
      <h2>🎮 VibeBattle</h2>
      <p style="margin-bottom: 15px; color: #888;">Player <span id="modal-player-id">1</span></p>
      <input type="text" id="name-input" placeholder="이름을 입력하세요" maxlength="20" autofocus>
      <br>
      <button id="name-submit">참가하기</button>
    </div>
  </div>

  <div class="header">
    <h1>🎮 VibeBattle</h1>
    <div class="player-info">
      <span>Player <span id="player-id">?</span></span>
      <input type="text" class="player-name-input" id="player-name" placeholder="이름">
      <span id="status-badge" class="status-badge">연결 중...</span>
    </div>
  </div>

  <div id="mission-banner" class="mission-banner">
    📋 미션: <span id="mission-text"></span>
  </div>

  <div class="main">
    <div class="editor-section">
      <div id="editor"></div>
    </div>
    <div class="preview-section">
      <div class="preview-header">📺 내 셀 미리보기</div>
      <div class="preview-canvas-wrap">
        <canvas id="preview-canvas" width="320" height="240"></canvas>
      </div>
      <div class="preview-stats">
        <div class="stat">📡 <span id="stat-status" class="stat-value">연결됨</span></div>
        <div class="stat">⚡ FPS: <span id="stat-fps" class="stat-value">60</span></div>
      </div>
    </div>
  </div>

  <button class="run-btn" id="run-btn">▶ 실행 (Ctrl+Enter)</button>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
  <script type="module" src="/js/player.js"></script>
</body>
</html>
