<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #main-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .player-card {
      position: absolute;
      pointer-events: auto;
      cursor: pointer;
      overflow: hidden;
    }

    .card-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      opacity: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      transition: opacity 0.3s ease;
    }

    .player-card.active .card-inner {
      opacity: 1;
    }

    .card-top {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-title {
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .card-author {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      font-weight: 400;
    }

    .card-bottom {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-desc {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      line-height: 1.5;
    }

    .card-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.8);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
    }

    .card-url {
      color: rgba(100, 180, 255, 0.8);
      font-size: 12px;
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #search-hint {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 100;
      color: rgba(255, 255, 255, 0.25);
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.4);
      transition: opacity 0.3s ease;
    }

    #search-hint.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #search-bar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    #search-bar.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #search-input {
      width: 320px;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    #search-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    #search-input:focus {
      border-color: rgba(100, 180, 255, 0.5);
    }
  </style>
</head>
<body>
  <div id="search-hint">/ 를 눌러 검색</div>
  <div id="search-bar">
    <input id="search-input" type="text" placeholder="프로젝트 검색 (이름, 설명, 작성자)">
  </div>
  <div id="wrapper">
    <canvas id="main-canvas"></canvas>
    <div id="overlay"></div>
  </div>
  <script type="module" src="/js/portfolio.js"></script>
</body>
</html>
